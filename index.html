<!doctype html>
<html lang="en">
  <head>

    <title>csp's aside bar</title>
    <link rel="stylesheet" href="./css/style.css" />
    <link rel="stylesheet" href="./fonts/stylesheet.css" />
  </head>
  <body>
    <aside class="aside">
      <div class="aside__btns">
        <div class="aside__btns__right">
          <button>
            <img src="./img/burger.svg" />
          </button>
          <button>
            <img src="./img/Group.svg" alt="" />
          </button>
        </div>
        <button>
          <img src="./img/search.svg" alt="" />
        </button>
      </div>
      <nav class="nav">
        <ul class="nav__list">
          <h2 class="nav__list__h2">Ремонт техники</h2>
          <li class="nav__list__item1"><a href="#">Услуги и сервисы</a></li>
          <li class="nav__list__item2">
            <a href="#">Корпоративным клиентам</a>
          </li>
          <li class="nav__list__item3"><a href="#">Продавцам техники</a></li>

          <li class="nav__list__item5"><a href="#">Производителям</a></li>
          <li class="nav__list__item6">
            <a href="#">Наши сервисные центры</a>
          </li>
          <li class="nav__list__item7"><a href="#">Контакты</a></li>
        </ul>
      </nav>

      <section class="menu__footer">
        <div class="menu__footer__container">
          <div class="menu__footer__btns">
          <button class="menu__footer__btn1">
            <img src="./img/call.svg" />
          </button>
          <button class="menu__footer__btn2">
            <img src="./img/chat.svg" />
          </button>
          <button class="menu__footer__btn3">
            <img src="./img/profile.svg" />
          </button>
        </div>
        <div class="menu__footer__mail">mail@cps.com</div>
        <div class="menu__footer__number">8 800 890 8900</div>
        <div class="menu__footer__lang-switch">
          <button>
            RU            
          </button>
          <button>
            EN
          </button>
          <button>
            CH
          </button>
        </div>
        </div>
      </section>

</html>
